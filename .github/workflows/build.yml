name: Build

on:
  push:
    branches: [main, cinematic-rebuild-v3]
  pull_request:

permissions:
  contents: read

jobs:
  production-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install --no-audit --no-fund
      - run: npm run check
      - run: npm run build
      - name: Verify supplied assets and production bundle
        shell: bash
        run: |
          test -s dist/index.html
          test -s dist/assets/stormbreaker.glb
          test -s dist/assets/asgard-mark.png
          test "$(head -c 4 dist/assets/stormbreaker.glb)" = "glTF"
          grep -R "Reassembling Stormbreaker from source chunks" dist/assets/*.js
          grep -R "STORMBREAKER COULD NOT BE FORGED" dist/assets/*.js
      - name: Verify rendered Stormbreaker and scroll sequences
        run: npm run test:e2e
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thor-cinematic-browser-evidence
          path: |
            artifacts/screens
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
