name: Build

on:
  push:
    branches: [main, cinematic-rebuild]
  pull_request:

permissions:
  contents: read

jobs:
  production-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build cinematic site
        run: npm run build

      - name: Verify production assets
        shell: bash
        run: |
          test -s dist/index.html
          test -s dist/assets/asgard-mark.png
          test -s dist/assets/stormbreaker.glb
          find dist/assets -name '*.js' -size +1k | grep -q .
