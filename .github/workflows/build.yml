name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  production-build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build static site
        run: npm run build

      - name: Verify reconstructed assets
        shell: bash
        run: |
          test -s dist/index.html
          test -s dist/assets/asgard-mark.png
          test -s dist/assets/stormbreaker.glb
